name: qedu-production

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - /opt/qedu/.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - qedu_mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - qedu
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8080:8080"
    networks:
      - qedu

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/abdullah117765/saas:latest}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - qedu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/abdullah117765/q_edu_backend:production}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - /opt/qedu/.env
    volumes:
      - qedu_uploads:/app/storage/uploads
    expose:
      - "3000"
    networks:
      - qedu

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - qedu

networks:
  qedu:
    driver: bridge

volumes:
  qedu_mysql_data:
  qedu_uploads:
